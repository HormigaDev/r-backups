services:
    r-backups:
        container_name: r-backups
        build:
            context: .
        environment:
            DATABASE_HOST: ${DATABASE_HOST}
            DATABASE_USER: ${DATABASE_USER}
            DATABASE_PASSWORD: ${DATABASE_PASSWORD}
            DATABASE_NAME: ${DATABASE_NAME}
        volumes:
            - ./backups:/backups
            - .:/app
        depends_on:
            - bbel-postgres
        stdin_open: true
        tty: true
        networks:
            - shared-network
        restart: always

    bbel-postgres:
        container_name: bbel-postgres
        restart: always
        image: postgres:15
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "5435:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - shared-network

    bbel-pgadmin:
        container_name: bbel-pgadmin
        restart: always
        image: dpage/pgadmin4
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
        ports:
            - "7070:80"
        extra_hosts:
            - "pgadmin2.localhost:127.0.0.1"
        depends_on:
            - bbel-postgres
        networks:
            - shared-network
        volumes:
            - pgadmin_data:/var/lib/pgadmin

volumes:
    postgres_data:
    pgadmin_data:

networks:
    shared-network:
        external: true
