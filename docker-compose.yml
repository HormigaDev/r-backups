services:
    r-backups:
        container_name: r-backups
        build:
            context: ./r-backups
        environment:
            DATABASE_HOST: bbel-postgres
            DATABASE_USER: bbel_user
            DATABASE_PASSWORD: bbel_4dm1n
            DATABASE_NAME: bbel_postgres
        volumes:
            - ./backups:/backups
        depends_on:
            - bbel-postgres
        stdin_open: true
        tty: true
        networks:
            - shared-network

    bbel-postgres:
        container_name: bbel-postgres
        restart: always
        image: postgres:15
        environment:
            POSTGRES_USER: bbel_postgres
            POSTGRES_PASSWORD: bbel_4dm1n
            POSTGRES_DB: bbel_postgres
        ports:
            - "5435:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - shared-network

    bbel-pgadmin:
        container_name: bbel-pgadmin
        restart: always
        image: dpage/pgadmin4
        environment:
            PGADMIN_DEFAULT_EMAIL: admin@bbel.local
            PGADMIN_DEFAULT_PASSWORD: bbel_4dm1n
        ports:
            - "5757:80"
        extra_hosts:
            - "bbel.localhost:127.0.0.1"
        depends_on:
            - bbel-postgres
        networks:
            - shared-network
volumes:
    postgres_data:

networks:
    shared-network:
        external: true
